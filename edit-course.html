<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/edit.js" defer></script>
</head>

<body>

<nav class="navbar">
    <h2 class="logo">DevCrew</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="add-course.html">Add Course</a>
    </div>
</nav>

<h1>Edit Course</h1>

<form>
    <div>
        <label for="courseID">ID:</label>
        <input type="text" id="courseId" readonly>
    </div>
    <div>
        <label for="courseNum">Course Number:</label>
        <input type="text" id="courseNum" required>
    </div>
    <div>
        <label for="courseName">Course Name:</label>
        <input type="text" id="courseName" required>
    </div>
    <div>
        <label for="credits">Credits:</label>
        <input type="number" id="credits" required>
    </div>
    <div>
        <label for="description">Description:</label>
        <input type="" id="description" required>
    </div>
    <button type="submit" id="updateCourse">Update Course</button>
    <button type="button" id="deleteCourse">Delete Course</button>
    <div id="error"></div>
</form>

</body>
</html>
